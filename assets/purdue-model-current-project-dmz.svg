<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .band { fill: #b9b9b9; }
      .label-band { fill: #b9b9b9; }
      .text { font-family: "Noto Sans CJK TC", "Microsoft JhengHei", Arial, sans-serif; fill: #111111; }
      .title { font-size: 34px; font-weight: 700; }
      .layer { font-size: 27px; font-weight: 600; }
      .item { font-size: 23px; font-weight: 600; }
      .small { font-size: 18px; font-weight: 500; }
      .tiny { font-size: 15px; font-weight: 500; }
      .box { fill: #f4f4f4; stroke: #111111; stroke-width: 3; rx: 8; }
      .node { fill: #f7f7f7; stroke: #111111; stroke-width: 3; rx: 10; }
      .line { stroke: #111111; stroke-width: 3; fill: none; stroke-dasharray: 10 9; }
      .arrow { stroke: #111111; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .solid { stroke: #111111; stroke-width: 3; fill: none; }
      .accent { fill: #0d83d4; }
      .brick { fill: #f05a24; }
      .icon { fill: none; stroke: #111111; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .bracket { fill: none; stroke: #111111; stroke-width: 3; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111111"/>
    </marker>
  </defs>

