<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 成大路燈智慧地圖</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sidebar: #0f172a;
            --bg: #f6f8fc;
            --panel: #ffffff;
            --line: #dfe6f1;
            --text: #172033;
            --muted: #64748b;
            --blue: #2563eb;
            --teal: #14b8a6;
            --red: #ef4444;
        }
        body {
            font-family: "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
        }
        .login-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(320px, 42vw) minmax(360px, 1fr);
        }
        .brand-pane {
            background:
                linear-gradient(180deg, rgba(15, 23, 42, .70), rgba(15, 23, 42, .92)),
                url("/static/img/ncku-gate.jpg");
            background-size: cover;
            background-position: center;
            color: #ffffff;
            padding: 34px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .brand-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .brand-row img {
            width: 48px;
            height: 56px;
            object-fit: contain;
            background: #ffffff;
            border-radius: 8px;
            padding: 5px;
        }
        .brand-row strong {
            display: block;
            font-size: 24px;
            line-height: 1.2;
            letter-spacing: 0;
        }
        .brand-row span {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: #cbd5e1;
        }
        .brand-copy h1 {
            font-size: 34px;
            line-height: 1.18;
            margin-bottom: 12px;
            letter-spacing: 0;
        }
        .brand-copy p {
            max-width: 460px;
            color: #dbeafe;
            line-height: 1.7;
            font-size: 15px;
        }
        .login-pane {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px;
        }
        .login-box {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 34px;
            box-shadow: 0 18px 42px rgba(15, 23, 42, .10);
        }
        .login-box h2 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #334155;
            font-weight: 800;
            margin-bottom: 7px;
        }
        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 13px;
            background: #f8fafc;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: #0f172a;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #9db8ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
            background: #ffffff;
        }
        .btn-login {
            width: 100%;
            height: 46px;
            background: var(--teal);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 8px;
            transition: transform .18s, box-shadow .18s, opacity .18s;
            box-shadow: 0 10px 20px rgba(20, 184, 166, .24);
        }
        .btn-login:hover {
            opacity: .94;
            transform: translateY(-1px);
        }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        @media (max-width: 820px) {
            .login-shell { grid-template-columns: 1fr; }
            .brand-pane { min-height: 280px; }
            .brand-copy h1 { font-size: 28px; }
            .login-pane { padding: 22px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <section class="brand-pane">
            <div class="brand-row">
                <img src="/static/img/ncku-logo.png" alt="NCKU">
                <div>
                    <strong>國立成功大學</strong>
                    <span>National Cheng Kung University</span>
                </div>
            </div>
            <div class="brand-copy">
                <h1>成大路燈智慧地圖</h1>
                <p>校區路燈狀態、地圖標點與控制入口整合於同一個後台介面。</p>
            </div>
        </section>

        <main class="login-pane">
            <div class="login-box">
                <h2>管理員登入</h2>
                <p class="subtitle">請輸入帳號密碼進入控制面板</p>

                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="form-group">
                        <label>帳號</label>
                        <input type="text" name="username" autofocus required>
                    </div>
                    <div class="form-group">
                        <label>密碼</label>
                        <input type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-login">登入</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
