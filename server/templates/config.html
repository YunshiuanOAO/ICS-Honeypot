<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Configuration - APS Honeypot</title>
    <link rel="stylesheet" href="/static/style.css?v=24">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme-preference') || 'system';
            const isDark = savedTheme === 'dark' || (savedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        })();
    </script>
    <style>
        /* Custom styles for config page */
        .config-layout {
            display: flex;
            height: calc(100vh - var(--header-height));
            overflow: hidden;
            background: var(--bg-dark);
        }
        .config-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            height: var(--header-height);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1000;
        }
        .config-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }
        .file-manager-sidebar {
            width: 300px;
            background: var(--bg-panel);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-section {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }
        .section-title {
            padding: 0 1rem 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px;
        }
        .section-title button:hover {
            color: var(--accent);
        }
        .tree-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem 0.5rem 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.2s;
            position: relative;
        }
        .tree-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        .tree-item.active {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.15), transparent);
            color: var(--accent-light);
            box-shadow: inset 3px 0 0 var(--accent);
        }
        .tree-item i {
            width: 16px;
            height: 16px;
        }
        .tree-item.level-2 {
            padding-left: 2.5rem;
        }
        .tree-item.level-3 {
            padding-left: 3.5rem;
        }
        .tree-folder {
            font-weight: 500;
        }
        .tree-actions {
            display: flex;
            opacity: 0.5;
            transition: opacity 0.2s;
            margin-left: auto;
        }
        .tree-item:hover .tree-actions {
            opacity: 1;
        }
        .tree-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
        }
        .tree-actions button:hover {
            color: var(--danger);
            background: rgba(255, 68, 68, 0.1);
        }
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            overflow: hidden;
            position: relative;
        }
        .editor-header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .editor-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        .code-textarea {
            flex: 1;
            width: 100%;
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: none;
            outline: none;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }
        .code-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
        }
        
        /* Form View inside Editor */
        .settings-form {
            max-width: 800px;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .form-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-row > * {
            flex: 1;
        }
        
        .empty-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
        .empty-editor i {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <script>
        const NODE_ID = "{{ node_id }}";
    </script>

    <div class="config-header">
        <div class="config-header-left">
            <button class="back-btn" onclick="window.location.href='/'" title="Back to Dashboard">
                <i data-lucide="arrow-left"></i>
            </button>
            <div>
                <h1 style="font-size: 1.25rem; margin: 0;">Configuration</h1>
                <p class="header-subtitle" style="margin: 0; font-size: 0.85rem;" id="header-node-id">Loading...</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="addDeployment()">
                <i data-lucide="plus"></i>
                <span>Add Deployment</span>
            </button>
            <button class="btn btn-primary" onclick="saveConfig()">
                <i data-lucide="save"></i>
                <span>Save Changes</span>
            </button>
        </div>
    </div>

    <div class="config-layout">
        <!-- Sidebar File Manager -->
        <aside class="file-manager-sidebar">
            <div class="sidebar-section">
                <div class="tree-item" id="nav-agent-settings" onclick="selectView('agent-settings')">
                    <i data-lucide="settings"></i>
                    <span>Agent Settings</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">
                    Deployments
                </div>
                <div id="deployments-tree">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">
                    Package Library
                </div>
                <div id="package-library-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Editor Area -->
        <main class="editor-main">
            <div class="editor-header" id="editor-header">
                System / Agent Settings
            </div>
            <div class="editor-content" id="editor-content">
                <!-- Renders forms or textareas dynamically -->
            </div>
        </main>
    </div>

    <script src="/static/config.js?v=3"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
