# Repeated login-like POSTs from one external IP.
name: HTTP Brute Force Login Attempt
type: frequency
index: honeypot-*

num_events: 5
timeframe:
  minutes: 2

filter:
  - query:
      query_string:
        query: 'protocol:(http OR https) AND http_method:POST'
  - bool:
      must_not:
        - query_string:
            query: >
              (attacker_ip:(127.* OR 10.* OR 169.254.* OR 192.168.* OR 0.* OR
              172.16.* OR 172.17.* OR 172.18.* OR 172.19.* OR 172.20.* OR 172.21.* OR 172.22.* OR 172.23.* OR
              172.24.* OR 172.25.* OR 172.26.* OR 172.27.* OR 172.28.* OR 172.29.* OR 172.30.* OR 172.31.* OR
              localhost OR fc* OR fd*) OR attacker_ip:"::1" OR
              src_ip:(127.* OR 10.* OR 169.254.* OR 192.168.* OR 0.* OR
              172.16.* OR 172.17.* OR 172.18.* OR 172.19.* OR 172.20.* OR 172.21.* OR 172.22.* OR 172.23.* OR
              172.24.* OR 172.25.* OR 172.26.* OR 172.27.* OR 172.28.* OR 172.29.* OR 172.30.* OR 172.31.* OR
              localhost OR fc* OR fd*) OR src_ip:"::1")
  - bool:
      minimum_should_match: 1
      should:
        - wildcard: {http_path: "*/login*"}
        - wildcard: {http_path: "*/signin*"}
        - wildcard: {http_path: "*/auth*"}
        - wildcard: {http_path: "*/session*"}
        - wildcard: {http_path: "*/admin*"}
        - wildcard: {http_uri: "*/login*"}
        - wildcard: {http_uri: "*/signin*"}
        - wildcard: {request_data: "*password*"}
        - wildcard: {request_data: "*passwd*"}

realert:
  minutes: 10
query_key:
  - attacker_ip
  - http_path

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "HTTP brute force login attempt"
  signature_id: 7000305
  category: "Attempted Administrator Privilege Gain"
  severity: 2
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  http_method: http_method
  http_path: http_path
  http_uri: http_uri
  http_status_code: http_status_code
  http_user_agent: http_user_agent
