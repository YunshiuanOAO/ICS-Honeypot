# Successful login-like web requests. Useful for honeypots that expose a web UI.
name: HTTP Successful Login
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: 'protocol:http AND http_method:POST AND (http_status_code:200 OR http_status_code:201 OR http_status_code:204 OR http_status_code:302 OR http_status_code:303)'
  - bool:
      minimum_should_match: 1
      should:
        - wildcard: {http_path: "*/login*"}
        - wildcard: {http_path: "*/signin*"}
        - wildcard: {http_path: "*/auth*"}
        - wildcard: {http_path: "*/session*"}
        - wildcard: {http_path: "*/admin*"}

realert:
  minutes: 10
query_key:
  - attacker_ip
  - http_path

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "HTTP successful login to honeypot web UI"
  signature_id: 7000302
  category: "Successful Administrator Privilege Gain"
  severity: 1
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  http_method: http_method
  http_path: http_path
  http_uri: http_uri
  http_status_code: http_status_code
  http_user_agent: http_user_agent
