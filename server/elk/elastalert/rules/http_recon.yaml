# HTTP — known attacker paths / payloads against the honeypot
#
# Path traversal, /etc/passwd, admin panels, SQLi-style payloads and
# common scanner user-agents (sqlmap, nuclei, nmap, masscan).
name: HTTP Reconnaissance / Exploit Probe
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        # query_string supports regex via /.../ syntax. We OR a few common
        # exploit/scanner signatures together so a single rule covers the
        # noisy "first stage" probes attackers try against honeypots.
        query: >
          protocol:http AND (
            http_path:*\.\.\/*  OR
            http_path:*/etc/passwd* OR
            http_path:*/admin* OR
            http_path:*/wp-admin* OR
            http_path:*/phpmyadmin* OR
            http_user_agent:*sqlmap* OR
            http_user_agent:*nuclei* OR
            http_user_agent:*nikto* OR
            http_user_agent:*masscan* OR
            http_user_agent:*gobuster*
          )

realert:
  minutes: 10
query_key:
  - attacker_ip

alert:
  - post

http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "HTTP exploit probe / scanner activity"
  signature_id: 7000301
  category: "Attempted Information Leak"
  severity: 2
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  http_path: http_path
  http_method: http_method
  http_user_agent: http_user_agent
