# Oversized TCP/custom payload that looks like a buffer overflow probe.
# Streetlight socket commands are normally tiny (roughly 10-30 bytes), so a
# payload above this threshold is suspicious enough to raise a high alert.
name: TCP Custom Buffer Overflow Probe
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: '(protocol:custom OR (protocol:tcp AND (dst_port:15567 OR dst_port:15568)))'
  - bool:
      minimum_should_match: 1
      should:
        - range:
            request_size_bytes:
              gte: 512
        - wildcard:
            request_data: "*41414141414141414141414141414141*"
        - wildcard:
            request_data: "*90909090909090909090909090909090*"

realert:
  minutes: 10
query_key:
  - attacker_ip
  - protocol
  - dst_port

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "TCP/custom possible buffer overflow probe"
  signature_id: 7000602
  category: "Attempted Denial of Service"
  severity: 1
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  request_size_bytes: request_size_bytes
  log_message: log_message
