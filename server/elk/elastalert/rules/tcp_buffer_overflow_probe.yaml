# TCP/custom payload that strongly resembles a buffer overflow probe.
#
# Normal streetlight socket commands are tiny. This rule only fires on large
# payloads or classic exploit filler patterns, so short commands such as "0a"
# remain Medium payload events instead of High overflow alerts.
name: TCP Custom Possible Buffer Overflow Probe
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: '(protocol:custom OR protocol:tcp)'
  - bool:
      must_not:
        - query_string:
            query: >
              (attacker_ip:(127.* OR 10.* OR 169.254.* OR 192.168.* OR 0.* OR
              172.16.* OR 172.17.* OR 172.18.* OR 172.19.* OR 172.20.* OR 172.21.* OR 172.22.* OR 172.23.* OR
              172.24.* OR 172.25.* OR 172.26.* OR 172.27.* OR 172.28.* OR 172.29.* OR 172.30.* OR 172.31.* OR
              localhost OR fc* OR fd*) OR attacker_ip:"::1" OR
              src_ip:(127.* OR 10.* OR 169.254.* OR 192.168.* OR 0.* OR
              172.16.* OR 172.17.* OR 172.18.* OR 172.19.* OR 172.20.* OR 172.21.* OR 172.22.* OR 172.23.* OR
              172.24.* OR 172.25.* OR 172.26.* OR 172.27.* OR 172.28.* OR 172.29.* OR 172.30.* OR 172.31.* OR
              localhost OR fc* OR fd*) OR src_ip:"::1")
  - bool:
      minimum_should_match: 1
      should:
        - range:
            request_size_bytes:
              gte: 2048
        - wildcard:
            request_data: "*41414141414141414141414141414141*"
        - wildcard:
            request_data: "*90909090909090909090909090909090*"

realert:
  seconds: 30
query_key:
  - attacker_ip
  - protocol
  - dst_port

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "TCP/custom possible buffer overflow probe"
  signature_id: 7000602
  category: "Attempted Denial of Service"
  severity: 1
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  request_size_bytes: request_size_bytes
  request_data: request_data
  log_message: log_message
