# MQTT suspicious usernames, subscriptions, publishes and topic enumeration.
name: MQTT Suspicious Username Topic Publish Subscribe
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: 'protocol:mqtt'
  - bool:
      minimum_should_match: 1
      should:
        - query_string:
            query: 'mqtt_username:(admin OR root OR test OR guest OR mqtt OR user OR default OR anonymous)'
        - query_string:
            query: 'mqtt_packet_type_name:(SUBSCRIBE OR PUBLISH OR UNSUBSCRIBE)'
        - wildcard: {mqtt_topic: "#"}
        - wildcard: {mqtt_topic: "+"}
        - wildcard: {mqtt_topic: "$SYS*"}
        - wildcard: {mqtt_topic: "*admin*"}
        - wildcard: {mqtt_topic: "*root*"}
        - wildcard: {mqtt_topic: "*test*"}
        - wildcard: {mqtt_topic: "*cmd*"}
        - wildcard: {mqtt_topic: "*command*"}
        - range:
            mqtt_payload_length:
              gt: 0

realert:
  minutes: 5
query_key:
  - attacker_ip
  - mqtt_packet_type_name

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "MQTT suspicious username/topic publish/subscribe"
  signature_id: 7000401
  category: "MQTT Suspicious Activity"
  severity: 2
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  mqtt_username: mqtt_username
  mqtt_topic: mqtt_topic
  mqtt_packet_type_name: mqtt_packet_type_name
  mqtt_payload_length: mqtt_payload_length
