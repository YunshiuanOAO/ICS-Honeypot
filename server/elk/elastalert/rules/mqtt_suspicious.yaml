# MQTT command-like topic or large publish payload.
#
# Weak usernames and wildcard topic enumeration have their own rules. This rule
# stays focused on command/control-style topics and unusually large payloads.
name: MQTT Suspicious Command Topic Or Payload
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: 'protocol:mqtt'
  - bool:
      must_not:
        - query_string:
            query: >
              (attacker_ip:(127.* OR 10.* OR 169.254.* OR 192.168.* OR 0.* OR
              172.16.* OR 172.17.* OR 172.18.* OR 172.19.* OR 172.20.* OR 172.21.* OR 172.22.* OR 172.23.* OR
              172.24.* OR 172.25.* OR 172.26.* OR 172.27.* OR 172.28.* OR 172.29.* OR 172.30.* OR 172.31.* OR
              localhost OR fc* OR fd*) OR attacker_ip:"::1" OR
              src_ip:(127.* OR 10.* OR 169.254.* OR 192.168.* OR 0.* OR
              172.16.* OR 172.17.* OR 172.18.* OR 172.19.* OR 172.20.* OR 172.21.* OR 172.22.* OR 172.23.* OR
              172.24.* OR 172.25.* OR 172.26.* OR 172.27.* OR 172.28.* OR 172.29.* OR 172.30.* OR 172.31.* OR
              localhost OR fc* OR fd*) OR src_ip:"::1")
  - bool:
      minimum_should_match: 1
      should:
        - wildcard: {mqtt_topic: "*cmd*"}
        - wildcard: {mqtt_topic: "*CMD*"}
        - wildcard: {mqtt_topic: "*command*"}
        - wildcard: {mqtt_topic: "*COMMAND*"}
        - wildcard: {mqtt_topic: "*control*"}
        - wildcard: {mqtt_topic: "*CONTROL*"}
        - wildcard: {mqtt_topic: "*exec*"}
        - wildcard: {mqtt_topic: "*EXEC*"}
        - wildcard: {mqtt_topic: "*admin*"}
        - wildcard: {mqtt_topic: "*root*"}
        - range:
            mqtt_payload_length:
              gte: 256

realert:
  minutes: 5
query_key:
  - attacker_ip
  - mqtt_packet_type_name

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "MQTT suspicious command topic or large payload"
  signature_id: 7000401
  category: "MQTT Suspicious Activity"
  severity: 2
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  mqtt_username: mqtt_username
  mqtt_topic: mqtt_topic
  mqtt_packet_type_name: mqtt_packet_type_name
  mqtt_payload_length: mqtt_payload_length
