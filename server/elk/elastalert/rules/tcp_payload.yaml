# Generic TCP/custom payload sent to a honeypot service.
name: TCP Payload Sent
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: '(protocol:tcp OR protocol:custom)'
  - bool:
      minimum_should_match: 1
      should:
        - range:
            request_size_bytes:
              gt: 0
        - wildcard:
            request_data: "?*"

realert:
  minutes: 5
query_key:
  - attacker_ip
  - protocol
  - dst_port

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "TCP/custom payload sent to honeypot service"
  signature_id: 7000601
  category: "Payload Delivery"
  severity: 2
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  request_size_bytes: request_size_bytes
  log_message: log_message
