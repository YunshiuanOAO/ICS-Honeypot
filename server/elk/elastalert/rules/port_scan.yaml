# Port scan — same attacker IP hitting many distinct ports
#
# `cardinality` counts distinct values of `dst_port` per `attacker_ip`
# inside the timeframe and alerts when it exceeds the threshold.
name: Port Scan (Multi-Port Probing)
type: cardinality
index: honeypot-*
cardinality_field: dst_port
max_cardinality: 5
timeframe:
  minutes: 5

filter:
  - query:
      query_string:
        query: "attacker_ip:*"

query_key:
  - attacker_ip
realert:
  minutes: 30

alert:
  - post

http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "Port sweep across multiple honeypot ports"
  signature_id: 7000501
  category: "Attempted Information Leak"
  severity: 2
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  timestamp: "@timestamp"
