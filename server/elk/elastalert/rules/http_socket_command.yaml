# WebSocket / Socket.IO / web command submissions.
name: HTTP Socket or Command Submission
type: any
index: honeypot-*

filter:
  - query:
      query_string:
        query: 'protocol:http AND (http_method:POST OR http_method:PUT OR http_method:PATCH OR http_method:GET)'
  - bool:
      minimum_should_match: 1
      should:
        - wildcard: {http_path: "*/socket.io*"}
        - wildcard: {http_path: "*/websocket*"}
        - wildcard: {http_path: "*/api/socket*"}
        - wildcard: {http_path: "*/command*"}
        - wildcard: {http_path: "*/cmd*"}
        - wildcard: {http_path: "*/exec*"}
        - wildcard: {request_data: "*socket.io*"}
        - wildcard: {request_data: "*websocket*"}
        - wildcard: {request_data: "*command*"}
        - wildcard: {request_data: "*cmd*"}
        - wildcard: {request_data: "*exec*"}
        - wildcard: {request_data: "*restart*"}
        - wildcard: {request_data: "*deploy*"}
        - wildcard: {request_data: "*start*"}
        - wildcard: {request_data: "*stop*"}

realert:
  minutes: 5
query_key:
  - attacker_ip
  - http_path

alert:
  - post
http_post_url: "${SERVER_INGEST_URL}"
http_post_headers:
  X-Api-Key: "${API_KEY}"
http_post_static_payload:
  signature: "HTTP socket or command submission"
  signature_id: 7000303
  category: "Potentially Bad Traffic"
  severity: 1
  source: "elastalert"
http_post_payload:
  attacker_ip: attacker_ip
  node_id: node_id
  protocol: protocol
  timestamp: "@timestamp"
  src_ip: src_ip
  src_port: src_port
  dst_ip: dst_ip
  dst_port: dst_port
  http_method: http_method
  http_path: http_path
  http_uri: http_uri
  http_status_code: http_status_code
