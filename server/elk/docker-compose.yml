version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: honeypot-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-honeypot}
      - POSTGRES_USER=${POSTGRES_USER:-honeypot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-honeypot_change_me}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - honeypot-net
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.15
    container_name: honeypot-es
    environment:
      - node.name=honeypot-es
      - cluster.name=honeypot-docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - honeypot-net
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.15
    container_name: honeypot-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - honeypot-net
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:7.17.15
    container_name: honeypot-filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # Mount the logs directory from the server (relative to this docker-compose file)
      - ../logs:/var/log/honeypot:ro
      # Persist registry to avoid duplicate ingestion on restart
      - filebeat_data:/usr/share/filebeat/data
    command: filebeat -e -strict.perms=false
    depends_on:
      - elasticsearch
    networks:
      - honeypot-net
    restart: unless-stopped

  elastalert:
    image: jertel/elastalert2:2.18.0
    container_name: honeypot-elastalert
    # ${API_KEY} comes from the host shell / docker-compose .env; rules
    # are rendered at startup so secrets aren't checked into git.
    environment:
      - API_KEY=${API_KEY}
      - SERVER_INGEST_URL=${SERVER_INGEST_URL:-http://host.docker.internal:8000/api/alerts/ingest}
    extra_hosts:
      # Lets the container talk to the FastAPI server running on the host.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./elastalert/config.yaml:/opt/elastalert/config.yaml:ro
      - ./elastalert/rules:/opt/elastalert/rules:ro
      - ./elastalert/render-rules.py:/opt/elastalert/render-rules.py:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python3 /opt/elastalert/render-rules.py &&
        # Wait for ES to be reachable (max 60s) before initializing or starting.
        for i in $$(seq 1 30); do
          if python3 -c "import urllib.request; urllib.request.urlopen('http://elasticsearch:9200/_cluster/health', timeout=2).read()" > /dev/null 2>&1; then
            echo "[entrypoint] elasticsearch is reachable"; break
          fi
          echo "[entrypoint] waiting for elasticsearch ($$i/30)..."; sleep 2
        done &&
        # Create the writeback index if it doesn't exist (idempotent).
        elastalert-create-index --index elastalert_status --old-index "" 2>&1 | tail -5 || true &&
        exec elastalert --config /opt/elastalert/config.yaml --verbose
    depends_on:
      - elasticsearch
    networks:
      - honeypot-net
    restart: unless-stopped

volumes:
  pg_data:
  es_data:
  filebeat_data:

networks:
  honeypot-net:
    driver: bridge
